# === 搜尋條件 ===
search:
  keywords:
    - "AI工程師"
    - "後端工程師"
  areas:
    - "6001001000"  # 台北市
    # - "6001002000"  # 新北市
    # - "6001008000"  # 台中市
  max_pages: 3      # 每組關鍵字最多抓幾頁

# === 篩選規則 ===
filter:
  min_salary_annual: 1000000  # 年薪門檻（元）
  accept_negotiable: true      # 「面議」是否收進來
  exclude_keywords:            # 排除含這些關鍵字的職缺
    - "博弈"
    - "棋牌"
    - "直銷"
  allowed_locations:           # 只保留這些地區的職缺（空 = 不限）
    - "台北市"
    - "新北市"
    - "台中市"
  max_experience_years: null   # null = 不限

# === 反爬設定 ===
rate_limit:
  min_sleep: 3
  max_sleep: 8

